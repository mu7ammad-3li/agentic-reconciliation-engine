services:
  postgres:
    image: postgres:16-alpine
    container_name: ledger-postgres
    environment:
      POSTGRES_USER: ledger_user
      POSTGRES_PASSWORD: ledger_password
      POSTGRES_DB: ledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger_user -d ledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  ledger-api:
    build:
      context: ./ledger-go
      dockerfile: Dockerfile
    container_name: ledger-api
    ports:
      - "8080:8080"   # REST
      - "50051:50051" # gRPC
    environment:
      DATABASE_URL: postgres://ledger_user:ledger_password@postgres:5432/ledger?sslmode=disable
      PORT: "8080"
      GRPC_PORT: "50051"
    depends_on:
      postgres:
        condition: service_healthy

  agents:
    build:
      context: ./agents
      dockerfile: Dockerfile
    container_name: reconciliation-agents
    environment:
      LEDGER_GRPC_ADDR: ledger-api:50051
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER}
      ALERT_PHONE_NUMBER: ${ALERT_PHONE_NUMBER}
    depends_on:
      - ledger-api

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: reconciliation-dashboard
    ports:
      - "3000:3000"
    environment:
      LEDGER_API_URL: http://ledger-api:8080
      LEDGER_GRPC_ADDR: ledger-api:50051
      DATABASE_URL: postgres://ledger_user:ledger_password@postgres:5432/ledger?sslmode=disable
    depends_on:
      - ledger-api

volumes:
  postgres_data:
